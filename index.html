<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Web Design</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            display:flex;
            flex-direction:column;
            min-height:100vh;
        }

        header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#333;
            display:flex;
            justify-content:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            padding:15px 20px;
            transition:0.3s;
        }

        nav a:hover{
            background:#555;
        }

        main{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
            text-align:center;
        }

        .content{
            background:white;
            padding:25px;
            border-radius:10px;
            max-width:800px;
            width:100%;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
        }

        footer{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:15px;
            width:100%;
        }

        /* Tablet */
        @media (max-width:768px){
            nav{
                flex-direction:column;
            }

            nav a{
                width:100%;
                text-align:center;
            }

            .content{
                width:90%;
            }
        }

        /* Mobile */
        @media (max-width:480px){
            header h1{
                font-size:24px;
            }

            main{
                padding:15px;
            }

            .content{
                width:100%;
                padding:15px;
            }

            footer{
                font-size:14px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>My Responsive Website</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<main>
    <div class="content">
        <h2>Welcome!</h2>
        <p>
            This is a simple responsive webpage created using HTML and CSS.
            The layout automatically adjusts for desktop, tablet, and mobile
            devices using CSS media queries.
        </p>
    </div>
</main>

<footer>
    <p>&copy; 2026 Juliana Fiona R. Allarde | FEU Institute of Technology</p>
</footer>

</body>
</html>
